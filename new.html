<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Simple Website</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }

        header {
            background: #4CAF50;
            color: white;
            padding: 20px 0;
        }

        nav {
            background: #333;
            padding: 10px;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }

        nav a:hover {
            text-decoration: underline;
        }

        section {
            padding: 40px 20px;
        }

        footer {
            background: #222;
            color: white;
            padding: 15px;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to My Website</h1>
    <p>A simple HTML example</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<section>
    <h2>About This Page</h2>
    <p>This is a basic website built with only HTML and CSS.</p>
    <button onclick="showMessage()">Click Me</button>
</section>

<footer>
    <p>© 2026 My Simple Website</p>
</footer>

<script>
    function showMessage() {
        alert("Hello! Thanks for clicking.");
    }
</script>

</body>
</html>
